name: PR validation
on:
  pull_request:
    branches: [ "develop", "release" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        python-version: [3.12, 3.13]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5 
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Analisar Codigo com Pylint (Django)
        run: |
          pip install pylint pylint-django
          pylint --load-plugins=pylint_django $(git ls-files '*.py')


      - name: Verificacao de Seguranca com Bandit
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json

      - name: Executar Testes e Gerar Cobertura
        env:
            SECRET_KEY: ${{ secrets.SECRET_KEY }}
            POSTGRES_DB: ${{ secrets.DB_NAME }}
            POSTGRES_USER: ${{ secrets.DB_USER }}
            POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
            POSTGRES_HOST: ${{ secrets.DB_HOST }}
            POSTGRES_PORT: ${{ secrets.DB_PORT }}
        run: |
          pip install coverage
          coverage run --source='.' manage.py test
          coverage xml

      - name: Upload do Relatorio de Cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml

      - name: Upload do Relatorio de Seguranca (Bandit)
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ matrix.python-version }}
          path: bandit-report.json
