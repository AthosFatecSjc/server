name: Commit Validation

on:
  push:
    branches:
      - 'ATHOS-**'

jobs:
  quick-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Preparar ambiente (.env)
        run: cp config/.env.template .env

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar Sintaxe Python
        run: |
          python -m py_compile $(git ls-files '*.py')

      - name: Analisar Código com Pylint (Django)
        continue-on-error: true
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: fake-key
          TEST_DB_ENGINE: django.db.backends.sqlite3
          TEST_DB_NAME: ":memory:"
        run: |
          pip install pylint pylint-django
          pylint --django-settings-module=config.settings $(git ls-files '*.py')

      - name: Aplicar Migrações (SQLite)
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: fake-key
          TEST_DB_ENGINE: django.db.backends.sqlite3
          TEST_DB_NAME: ":memory:"
        run: |
          python manage.py migrate --no-input

      - name: Executar Testes Unitários (SQLite)
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: fake-key
          TEST_DB_ENGINE: django.db.backends.sqlite3
          TEST_DB_NAME: ":memory:"
        run: |
          python manage.py test --parallel

      - name: Análise no SonarCloud
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
