name: Commit Validation

on:
  push:
    branches:
      - 'ATHOS-**'

jobs:
  quick-validation:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        python-version: [3.12, 3.13]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar Sintaxe Python
        run: |
          python -m py_compile $(git ls-files '*.py')

      - name: Analisar Código com Pylint (Django)
        continue-on-error: true
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: fake-key
          TEST_DB_ENGINE: django.db.backends.sqlite3
          TEST_DB_NAME: ":memory:"
        run: |
          pip install pylint pylint-django
          pylint --django-settings-module=config.settings $(git ls-files '*.py')

      - name: Aplicar Migrações (SQLite)
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: fake-key
          TEST_DB_ENGINE: django.db.backends.sqlite3
          TEST_DB_NAME: ":memory:"
        run: |
          python manage.py migrate --no-input

      - name: Executar Testes Unitários (SQLite)
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: fake-key
          TEST_DB_ENGINE: django.db.backends.sqlite3
          TEST_DB_NAME: ":memory:"
        run: |
          python manage.py test --parallel
