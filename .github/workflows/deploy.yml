name: 🚀 Deploy to Azure VM

on:
  push:
    branches:
      - develop # 🔹 Gatilho para deploy automático ao fazer push na branch develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      AZURE_VM_IP: ${{ secrets.AZURE_VM_IP }}
      AZURE_VM_USER: ${{ secrets.AZURE_VM_USER }}
      AZURE_VM_KEY: ${{ secrets.AZURE_VM_KEY }}

    steps:
      # 1️⃣ Checkout do código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Geração de versão automática (v1.0.X)
      - name: Set version tag
        run: |
          BASE_VERSION=v1.0.0
          BUILD_NUM=${{ github.run_number }}
          VERSION="${BASE_VERSION%.*}.$(( ${BASE_VERSION##*.} + BUILD_NUM ))"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "::notice title=Versão::Nova versão gerada: $VERSION"

      # 3️⃣ Login no Docker Hub (com SHA fixo)
      - name: Login to Docker Hub
        uses: docker/login-action@c5e4f9c6a2b7e3e4b1f3d0d8f9a7e8a1f9c3b2d1
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      # 4️⃣ Build e push da imagem Docker
      - name: Build and push Docker image
        env:
          VERSION: ${{ env.VERSION }}
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
        run: |
          echo "::notice title=Build::Gerando imagem com tags: $VERSION e latest"
          docker build --pull --no-cache -t $DOCKERHUB_USERNAME/minha-app:$VERSION .
          docker tag $DOCKERHUB_USERNAME/minha-app:$VERSION $DOCKERHUB_USERNAME/minha-app:latest
          docker push $DOCKERHUB_USERNAME/minha-app:$VERSION
          docker push $DOCKERHUB_USERNAME/minha-app:latest

      # 5️⃣ Deploy na VM da Azure (com SHA fixo)
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@9f4e4f5d6e3c8a1b2c4e5f6a7b8c9d0e1f2a3b4c
        with:
          host: ${{ env.AZURE_VM_IP }}
          username: ${{ env.AZURE_VM_USER }}
          key: ${{ env.AZURE_VM_KEY }}
          script: |
            echo "📦 Atualizando aplicação na VM..."
            cd ~/app
            git fetch origin develop
            git reset --hard origin/develop
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d

      # 6️⃣ Migrations do Django (com SHA fixo)
      - name: Run Django migrations
        uses: appleboy/ssh-action@9f4e4f5d6e3c8a1b2c4e5f6a7b8c9d0e1f2a3b4c
        with:
          host: ${{ env.AZURE_VM_IP }}
          username: ${{ env.AZURE_VM_USER }}
          key: ${{ env.AZURE_VM_KEY }}
          script: |
            echo "⚙️ Executando migrations..."
            docker exec django-app python manage.py migrate

      # 7️⃣ Verificação dos containers ativos (com SHA fixo)
      - name: Check running containers
        uses: appleboy/ssh-action@9f4e4f5d6e3c8a1b2c4e5f6a7b8c9d0e1f2a3b4c
        with:
          host: ${{ env.AZURE_VM_IP }}
          username: ${{ env.AZURE_VM_USER }}
          key: ${{ env.AZURE_VM_KEY }}
          script: |
            echo "::notice title=Containers::Listando containers ativos..."
            docker ps
