name: Deploy Local (Dev + push temporary)

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy-local:
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/minha-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version tag
        run: |
          BASE_VERSION=v1.0.0
          BUILD_NUM=${{ github.run_number }}
          VERSION="${BASE_VERSION%.*}.$(( ${BASE_VERSION##*.} + BUILD_NUM ))"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "::notice title=Versão::Nova versão local: $VERSION"

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build image (CI runner)
        run: |
          docker build --pull --no-cache -t $IMAGE_NAME:${{ env.VERSION }} .
          docker tag $IMAGE_NAME:${{ env.VERSION }} $IMAGE_NAME:latest

      - name: Push image to Docker Hub (temporary)
        run: |
          docker push $IMAGE_NAME:${{ env.VERSION }}
          docker push $IMAGE_NAME:latest

      - name: Start compose on runner (validate)
        run: |
          # Não é a mesma coisa que rodar local na sua máquina, mas valida build+up.
          docker compose -f docker-compose.dev.yml down --remove-orphans || true
          docker compose -f docker-compose.dev.yml up -d --build
          sleep 8
          docker ps
