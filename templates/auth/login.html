{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athos Insight • Login</title>
    <link rel="icon" href="{% static 'logo.png' %}" type="image/png" sizes="128x128">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          integrity="sha512-pO6H9K4e5phZg0MZz2q4WvSxZQpRtYHAlT7koT6n2lJd3zvB1ZfP3ynGSlMHDnPl0gP5cFVH7W8K6U9tk5eWZQ=="
          crossorigin="anonymous" referrerpolicy="no-referrer">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="bg-gray-900 bg-opacity-80 border border-gray-700 shadow-xl rounded-2xl p-10 backdrop-blur">
            <div class="flex flex-col items-center gap-3 mb-8">
                <img src="{% static 'logo.png' %}" alt="Athos Insight" class="h-16 w-16 object-contain">
                <div class="text-center">
                    <p class="text-2xl font-semibold text-white">Bem-vindo de volta</p>
                    <p class="text-gray-400 text-sm">Use qualquer credencial fake listada abaixo para entrar.</p>
                </div>
            </div>

            {% if error_message %}
                <div class="mb-6 rounded-lg border border-red-500 bg-red-500 bg-opacity-10 px-4 py-3 text-sm text-red-200">
                    {{ error_message }}
                </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label for="username" class="block text-gray-300 text-sm font-medium mb-1">Usuário</label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        required
                        autofocus
                        class="w-full rounded-lg border border-gray-700 bg-gray-800 text-gray-100 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        placeholder="admin ou demo"
                    >
                </div>

                <div>
                    <label for="password" class="block text-gray-300 text-sm font-medium mb-1">Senha</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        required
                        class="w-full rounded-lg border border-gray-700 bg-gray-800 text-gray-100 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        placeholder="123456 ou demo"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full inline-flex items-center justify-center gap-2 rounded-lg bg-blue-600 text-white font-semibold py-2.5 transition hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-500 focus:ring-opacity-50"
                >
                    <span>Entrar</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" integrity="sha512-pS8dzFmNzjJ08B78fgXQ9IB0Rc+ZjspHzws22I/a0fOqr0TkbaMHM2R5E4NgWkt50l+4exsbm0PiHw5GogWb1w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>
</html>
