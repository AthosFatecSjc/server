[tool.black]
line-length = 88
target-version = ['py312']
skip-string-normalization = false
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.mypy_cache
  | \.venv
  | venv
  | env
  | build
  | dist
  | site-packages
  | requirements\.txt
)/
'''

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip = ["venv", ".venv", "env"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"  # ajuste se seu módulo principal for outro
python_files = ["tests.py", "test_*.py", "*_tests.py"]
addopts = [
    "--cov=.",
    "--cov-report=term-missing",
    "--cov-report=xml",
    "-ra",
    "-q"
]
testpaths = ["tests", "apps"]
