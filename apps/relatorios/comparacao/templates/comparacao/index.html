<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Página de Boas-vindas</title>
  <style>
    :root{--bg:#f7f9fc;--card:#ffffff;--accent:#3b82f6;--text:#0f172a}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;height:100vh}
    .card{background:var(--card);padding:32px;border-radius:12px;box-shadow:0 6px 20px rgba(15,23,42,0.08);width:min(720px,90%);text-align:center}
    h1{margin:0 0 8px;font-size:28px}
    p{margin:0 0 20px;color:#475569}
    .btn{display:inline-block;padding:10px 18px;border-radius:8px;background:var(--accent);color:white;text-decoration:none;font-weight:600}
    footer{margin-top:18px;font-size:13px;color:#94a3b8}
  </style>
</head>
  <body>
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 mb-6">
        <div class="flex items-center gap-2 mb-4">
            <i data-lucide="filter" class="w-5 h-5 text-blue-600"></i>
            <h2 class="text-lg font-semibold">Filtros</h2>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Projeto</label>
                <select id="projectFilter" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                  {% for nome_projeto in nome_projetos %}
                    <option value="{{ nome_projeto }}">{{ nome_projeto }}</option>
                  {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Ano</label>
                <select id="yearFilter" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                  {% for ano in anos_disponiveis %}
                    <option value="{{ ano }}" {% if ano_atual == ano %}selected{% endif %}>{{ ano }}</option>
                  {% endfor %}
                </select>
            </div>
        </div>
    </div>
  </body>
</html>
