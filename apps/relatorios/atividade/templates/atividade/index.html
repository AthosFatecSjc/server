{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Controle de Horas - Projeto / Equipe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.min.js" integrity="sha256-Lye89HGy1p3XhJT24hcvsoRw64Q4IOL5a7hdOflhjTA=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js" integrity="sha256-IMCPPZxtLvdt9tam8RJ8ABMzn+Mq3SQiInbDmMYwjDg=" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        html, body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body { font-family: "Noto Sans", sans-serif; margin: 16px; background-color: #f4f7f9; }
        .container { 
            margin: 0;
            max-width: none;
            padding: 0;
        }
        .conteudo {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 16px;
            align-items: start;
            min-width: 0;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .header h1 {
            font-weight: 400;
            font-size: 1.5em;
            color: #0000FF;
        }
        .filters { margin-bottom: 16px; background: #fff; padding: 16px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); border-left: 4px solid #0000FF; }
        .htmx-indicator{ display: none; }
        .filter-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .filter-header .filter-title {
            display: flex;
            align-items: center;
            color: #0000FF;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .filter-header .filter-title .filter-icon {
            margin-right: 8px;
        }
        .filter-subtitle {
            margin-left: 28px;
            margin-top: 2px;
            font-size: 0.8rem;
            color: #3b4b61;
        }
        .filter-form { display: flex; align-items: center; gap: 16px; }
        .filter-form select { padding: 6px 10px; border-radius: 6px; border: 1px solid #ccd4e0; font-size: 0.9em; background-color: #fdfdfd; }
        
        /* Classes básicas do Tailwind para compatibilidade */
        .bg-primary { background-color: #3b82f6; }
        .text-white { color: white; }
        .font-medium { font-weight: 500; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .rounded { border-radius: 0.25rem; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .justify-end { justify-content: flex-end; }
        .w-5 { width: 1.25rem; }
        .h-5 { height: 1.25rem; }
        .mr-2 { margin-right: 0.5rem; }
        .text-lg { font-size: 1.125rem; }
        .font-semibold { font-weight: 600; }
        .text-primary { color: #3b82f6; }
        .text-muted-foreground { color: #6b7280; }
        .mt-1 { margin-top: 0.25rem; }
        .mb-4 { margin-bottom: 1rem; }
        .gap-3 { gap: 0.75rem; }
        .text-gray-600 { color: #4b5563; }
        .space-y-6 > * + * { margin-top: 1.5rem; }
        .text-2xl { font-size: 1.5rem; line-height: 2rem; }
        .ml-auto { margin-left: auto; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            max-width: 400px;
            width: 90%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="space-y-6">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-semibold text-primary">Controle de Horas - Projeto / Equipe</h2>
                </div>
                <div class="ml-auto">
                    <button id="exportPdfButton" class="bg-primary hover:bg-blue-700 text-white font-medium py-2 px-4 rounded flex items-center">
                        <svg class="icon w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        Exportar PDF
                    </button>
                </div>
            </div>

        <div class="filters">
            <div class="filter-header">
                <div class="filter-title">
                    <span class="filter-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#0000FF" viewBox="0 0 16 16">
                            <path d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.128.334L10 8.692V13.5a.5.5 0 0 1-.342.474l-3 1A.5.5 0 0 1 6 14.5V8.692L1.628 3.834A.5.5 0 0 1 1.5 3.5zm1 .5v1.308l4.372 4.858A.5.5 0 0 1 7 8.5v5.306l2-.666V8.5a.5.5 0 0 1 .128-.334L13.5 3.308V2z"/>
                        </svg>
                    </span>
                    <span>Filtros</span>
                </div>
                <div class="filter-subtitle">Mês / Ano</div>
            </div>
            <form class="filter-form"
                  hx-get="{% url 'relatorio_tabela_e_cards' %}"
                  hx-target="#controle_horas_projeto_equipe"
                  hx-trigger="load, change"
                  hx-indicator="#loading">
                
                <select name="mes" aria-label="Mês">
                    <option value="1" {% if mes_atual == 1 %}selected{% endif %}>Janeiro</option>
                    <option value="2" {% if mes_atual == 2 %}selected{% endif %}>Fevereiro</option>
                    <option value="3" {% if mes_atual == 3 %}selected{% endif %}>Março</option>
                    <option value="4" {% if mes_atual == 4 %}selected{% endif %}>Abril</option>
                    <option value="5" {% if mes_atual == 5 %}selected{% endif %}>Maio</option>
                    <option value="6" {% if mes_atual == 6 %}selected{% endif %}>Junho</option>
                    <option value="7" {% if mes_atual == 7 %}selected{% endif %}>Julho</option>
                    <option value="8" {% if mes_atual == 8 %}selected{% endif %}>Agosto</option>
                    <option value="9" {% if mes_atual == 9 %}selected{% endif %}>Setembro</option>
                    <option value="10" {% if mes_atual == 10 %}selected{% endif %}>Outubro</option>
                    <option value="11" {% if mes_atual == 11 %}selected{% endif %}>Novembro</option>
                    <option value="12" {% if mes_atual == 12 %}selected{% endif %}>Dezembro</option>
                </select>

                <select name="ano" aria-label="Ano">
                    {% for ano in anos_disponiveis %}
                        <option value="{{ ano }}" {% if ano == ano_atual %}selected{% endif %}>{{ ano }}</option>
                    {% endfor %}
                </select>
            </form>
        </div>
        
        <div id="loading" class="htmx-indicator">
            Carregando dados...
        </div>

        <div id="controle_horas_projeto_equipe"></div>
        
        </div>
    </div>

    <!-- Modal de confirmação de exportação PDF -->
    <div id="pdfModal" class="modal-overlay">
        <div class="modal-content">
            <div class="mb-4">
                <h3 class="text-lg font-semibold text-primary">Confirmar Exportação</h3>
                <p class="text-muted-foreground mt-1">Deseja exportar o relatório de atividades para PDF?</p>
            </div>
            <div class="flex justify-end gap-3">
                <button id="cancelExport" class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium">
                    Cancelar
                </button>
                <button id="confirmExport" class="px-4 py-2 bg-primary hover:bg-blue-700 text-white rounded font-medium">
                    Confirmar
                </button>
            </div>
        </div>
    </div>
    
    <script src="{% static 'js/htmx.min.js' %}"></script>
    
    <script>
        // Variáveis globais para capturar os valores atuais dos filtros
        let currentMonth = {{ mes_atual }};
        let currentYear = {{ ano_atual }};
        
        // Atualizar as variáveis quando os filtros mudarem
        document.querySelector('select[name="mes"]').addEventListener('change', function(e) {
            currentMonth = parseInt(e.target.value);
        });
        
        document.querySelector('select[name="ano"]').addEventListener('change', function(e) {
            currentYear = parseInt(e.target.value);
        });
        
        // Funcionalidade do modal de exportação PDF
        const pdfModal = document.getElementById('pdfModal');
        const exportButton = document.getElementById('exportPdfButton');
        const confirmButton = document.getElementById('confirmExport');
        const cancelButton = document.getElementById('cancelExport');
        
        function openModal(modal) {
            modal.classList.add('active');
        }
        
        function closePdfModal() {
            pdfModal.classList.remove('active');
        }
        
        exportButton.addEventListener('click', function() {
            openModal(pdfModal);
        });
        
        cancelButton.addEventListener('click', closePdfModal);
        
        confirmButton.addEventListener('click', function() {
            closePdfModal(); 
            window.location.href = "{% url 'exportar_atividade_pdf' %}?mes=" + currentMonth + "&ano=" + currentYear;
        });
        
        pdfModal.addEventListener('click', function(e) {
            if (e.target === pdfModal) {
                closePdfModal();
            }
        });
    </script>

</body>
</html>
