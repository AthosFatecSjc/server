<div class="filter-group filter-type">
    <h3>Filtrar por Tipo</h3>
    <div class="filter-buttons" id="type-filters">
        <button class="filter-btn active" data-filter="all" onclick="filterByType('all')"
            title="Mostrar todos os tipos">
            Todos
        </button>
        <button class="filter-btn" data-filter="issue" onclick="filterByType('issue')" title="Tarefa, SubTarefa, Task">
            Issue
        </button>
        <button class="filter-btn" data-filter="bug" onclick="filterByType('bug')" title="Bug, Erro, Error">
            Bug
        </button>
        <button class="filter-btn" data-filter="Story" onclick="filterByType('Story')" title="Story, Epic, História">
            Story
        </button>
    </div>
</div>
