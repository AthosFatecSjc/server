<section class="mt-6 mb-10">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="relative bg-white border border-gray-200 rounded-xl p-6 pl-8 shadow-sm hover:shadow-md transition-all">
            <span aria-hidden="true" class="absolute inset-y-0 left-0 w-1 rounded-l-xl bg-blue-500 pointer-events-none"></span>
            <div class="flex justify-between items-start">
                <span class="text-sm text-gray-500 font-medium">Orçamento Previsto</span>
                {% if pode_editar_orcamento %}
                    <button
                        class="text-blue-500 hover:text-blue-700 transition-colors"
                        onclick="openOrcamentoModal()"
                        title="Editar orçamento previsto"
                    >
                        <i class="fa fa-pen text-sm"></i>
                    </button>
                {% endif %}
            </div>
            <span class="text-3xl font-bold text-blue-600 mt-2 block" id="orcamentoPrevistoValue">--</span>
        </div>

        <div class="relative bg-white border border-gray-200 rounded-xl p-6 pl-8 shadow-sm hover:shadow-md transition-all">
            <span aria-hidden="true" class="absolute inset-y-0 left-0 w-1 rounded-l-xl bg-red-500 pointer-events-none"></span>
            <span class="text-sm text-gray-500 font-medium">Custo Realizado</span>
            <span class="text-3xl font-bold text-red-500 mt-2 block" id="custoRealizadoValue">--</span>
        </div>


        <div class="relative bg-white border border-gray-200 rounded-xl p-6 pl-8 shadow-sm hover:shadow-md transition-all">
            <span aria-hidden="true" class="absolute inset-y-0 left-0 w-1 rounded-l-xl bg-green-500 pointer-events-none"></span>
            <span class="text-sm text-gray-500 font-medium">Saldo Remanescente</span>
            <span class="text-3xl font-bold text-green-600 mt-2 block" id="saldoRemanescenteValue">--</span>
        </div>

        <div class="relative bg-white border border-gray-200 rounded-xl p-6 pl-8 shadow-sm hover:shadow-md transition-all">
            <span aria-hidden="true" class="absolute inset-y-0 left-0 w-1 rounded-l-xl bg-indigo-500 pointer-events-none"></span>
            <span class="text-sm text-gray-500 font-medium">% Orçamento Utilizado</span>
            <span class="text-3xl font-bold text-gray-800 mt-2 block" id="orcamentoUtilizadoValue">--</span>
            <div class="w-full h-2 bg-gray-100 rounded mt-3">
                <div class="h-2 rounded bg-blue-500 transition-all" id="orcamentoUtilizadoBar" style="width: 0%;"></div>
            </div>
        </div>
    </div>
</section>

{% if pode_editar_orcamento %}
    <div id="modalOrcamento" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-sm animate-fade-in">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Editar Orçamento Previsto</h3>
            <label for="inputOrcamento" class="block text-sm text-gray-600 mb-2">Valor (R$)</label>
            <input
                type="number"
                id="inputOrcamento"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="0,00"
                min="0"
                step="0.01"
            >
            <p id="orcamentoModalError" class="text-sm text-red-600 mb-4 hidden"></p>
            <div class="flex justify-end gap-2">
                <button
                    class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-700 font-medium transition-colors"
                    onclick="closeOrcamentoModal()"
                >
                    Cancelar
                </button>
                <button
                    id="salvarOrcamentoButton"
                    class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors disabled:opacity-60"
                    onclick="salvarOrcamento()"
                >
                    Salvar
                </button>
            </div>
        </div>
    </div>
{% endif %}

<script>
const podeEditarOrcamento = {{ pode_editar_orcamento|default:False|yesno:"true,false" }};

function getCsrfToken() {
    const csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
    if (csrfInput) {
        return csrfInput.value;
    }

    const csrfCookie = document.cookie
        .split('; ')
        .find(cookie => cookie.startsWith('csrftoken='));

    return csrfCookie ? csrfCookie.split('=')[1] : '';
}

function setBudgetModalError(message) {
    const errorElement = document.getElementById('orcamentoModalError');
    if (!errorElement) {
        return;
    }

    if (!message) {
        errorElement.textContent = '';
        errorElement.classList.add('hidden');
        return;
    }

    errorElement.textContent = message;
    errorElement.classList.remove('hidden');
}

function openOrcamentoModal() {
    if (!podeEditarOrcamento) {
        return;
    }

    if (!globalThis.selectedProjectData || !globalThis.selectedProjectData.id) {
        alert("Selecione um projeto para editar o orçamento.");
        return;
    }

    const modal = document.getElementById('modalOrcamento');
    if (!modal) {
        return;
    }

    setBudgetModalError('');

    const input = document.getElementById('inputOrcamento');
    if (input) {
        const currentBudget = Number.parseFloat(globalThis.selectedProjectData.orcamentoPrevisto);
        input.value = Number.isFinite(currentBudget) ? currentBudget.toFixed(2) : '';
        input.focus();
        input.select();
    }

    modal.classList.remove('hidden');
}

function closeOrcamentoModal() {
    const modal = document.getElementById('modalOrcamento');
    if (!modal) {
        return;
    }

    setBudgetModalError('');
    modal.classList.add('hidden');
}

async function salvarOrcamento() {
  if (!podeEditarOrcamento) return;
  if (!isProjetoSelecionado()) return;

  const numericValue = obterValorOrcamento();
  if (!valorOrcamentoValido(numericValue)) return;

  limparErroOrcamento();

  const projectId = globalThis.selectedProjectData.id;
  const saveButton = prepararBotaoSalvar(true);

  try {
    const data = await enviarOrcamento(projectId, numericValue);
    if (!data) return;

    atualizarDadosProjeto(data, numericValue);
    atualizarDatasetProjetoAtivo();
    atualizarDashboard();

    closeOrcamentoModal();
  } catch (error) {
    console.error("Erro ao salvar orçamento previsto", error);
    setBudgetModalError("Erro inesperado ao salvar o orçamento. Tente novamente.");
  } finally {
    prepararBotaoSalvar(false, saveButton);
  }
}


function isProjetoSelecionado() {
  if (!globalThis.selectedProjectData?.id) {
    setBudgetModalError("Selecione um projeto para editar o orçamento.");
    return false;
  }
  return true;
}

function obterValorOrcamento() {
  const rawValue = document.getElementById("inputOrcamento").value;
  return Number.parseFloat(rawValue) || 0;
}

function valorOrcamentoValido(numericValue) {
  if (!Number.isFinite(numericValue) || numericValue <= 0) {
    setBudgetModalError("Informe um valor de orçamento válido.");
    return false;
  }
  return true;
}

function limparErroOrcamento() {
  setBudgetModalError("");
}

function prepararBotaoSalvar(disable, button = document.getElementById("salvarOrcamentoButton")) {
  if (!button) return null;

  if (disable) {
    if (!button.dataset.originalLabel) {
      button.dataset.originalLabel = button.textContent || "Salvar";
    }
    button.disabled = true;
    button.textContent = "Salvando...";
  } else {
    const originalLabel = button.dataset.originalLabel || "Salvar";
    button.disabled = false;
    button.textContent = originalLabel;
    delete button.dataset.originalLabel;
  }

  return button;
}

async function enviarOrcamento(projectId, numericValue) {
  const response = await fetch(`/dashboards/projeto/api/projetos/${projectId}/orcamento/`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": getCsrfToken(),
      "X-Requested-With": "XMLHttpRequest",
    },
    body: JSON.stringify({ valor: numericValue }),
  });

  const data = await response.json();
  if (!response.ok) {
    const message = data?.message || "Não foi possível salvar o orçamento.";
    setBudgetModalError(message);
    return null;
  }
  return data;
}

function atualizarDadosProjeto(data, numericValue) {
  const sel = globalThis.selectedProjectData;

  sel.orcamentoPrevisto = Number.isFinite(data?.orcamento_previsto)
    ? data.orcamento_previsto
    : numericValue;

  sel.custoRealizado = Number.isFinite(data?.custo_realizado)
    ? data.custo_realizado
    : sel.custoRealizado || 0;

  sel.saldoRemanescente = Number.isFinite(data?.saldo_remanescente)
    ? data.saldo_remanescente
    : sel.orcamentoPrevisto - sel.custoRealizado;

  let percentualUtilizado = 0;
  if (Number.isFinite(data?.percentual_utilizado)) {
    percentualUtilizado = data.percentual_utilizado;
  } else if (sel.orcamentoPrevisto > 0) {
    percentualUtilizado = (sel.custoRealizado / sel.orcamentoPrevisto) * 100;
  }

  sel.percentualUtilizado = percentualUtilizado;
}

function atualizarDatasetProjetoAtivo() {
  const activeOption = document.querySelector("#projectDropdown .select-option.active");
  if (!activeOption) return;

  const sel = globalThis.selectedProjectData;
  activeOption.dataset.projectOrcamentoPrevisto = sel.orcamentoPrevisto;
  activeOption.dataset.projectSaldoRemanescente = sel.saldoRemanescente;
  activeOption.dataset.projectPercentualUtilizado = sel.percentualUtilizado;
  activeOption.dataset.projectCustoRealizado = sel.custoRealizado;
}

function atualizarDashboard() {
  if (typeof updateDashboardCards === "function") {
    updateDashboardCards(globalThis.selectedProjectData || null);
  }
}

</script>
