<div class="bg-white rounded-2xl shadow-lg border border-gray-200">
    <div class="px-4 py-3 border-b border-gray-200">
        <h2 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
            <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.207A1 1 0 013 6.5V4z"/>
            </svg>
            Filtros
        </h2>
    </div>
    <form
        id="filtersForm"
        method="get"
        class="px-4 py-3 space-y-4"
    >
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-4 items-end">
            <div class="lg:col-span-2">
                <label class="text-xs text-gray-500 mb-2 block">Projeto</label>
                <select name="projeto" id="projectSelect" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos os projetos</option>
                    {% for projeto in projetos %}
                    <option value="{{ projeto.id }}" {% if request.GET.projeto == projeto.id|stringformat:"s" %}selected{% endif %}>
                        {{ projeto.nome }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="lg:col-span-1">
                <label class="text-xs text-gray-500 mb-2 block">Início</label>
                <input type="date" name="data_inicio" id="dateFrom" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                       value="{{ request.GET.data_inicio|default:data_inicio_default }}">
            </div>
            <div class="lg:col-span-1">
                <label class="text-xs text-gray-500 mb-2 block">Fim</label>
                <input type="date" name="data_fim" id="dateTo" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                       value="{{ request.GET.data_fim|default:data_fim_default }}">
            </div>
            <div class="lg:col-span-1 flex justify-end items-end gap-3">
                <button
                    type="button"
                    class="px-4 py-2 border border-gray-300 text-gray-700 rounded-md bg-white hover:bg-gray-50 shadow-sm"
                    onclick="clearFilters()">
                    Limpar
                </button>
                <button
                    type="submit"
                    class="px-5 py-2 text-white font-semibold rounded-md shadow"
                    style="background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);"
                >
                    <span class="inline-flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 4h18M7 4v8a2 2 0 002 2h6a2 2 0 002-2V4m-7 12v2m4-2v2" />
                        </svg>
                        Aplicar
                    </span>
                </button>
            </div>
        </div>
        <div class="mt-3 text-sm text-gray-500">
            <span class="font-medium">Período selecionado: </span>
            <span id="periodDisplay">
                {% if request.GET.data_inicio and request.GET.data_fim %}
                    {{ request.GET.data_inicio }} até {{ request.GET.data_fim }}
                {% else %}
                    {{ data_inicio_default }} até {{ data_fim_default }}
                {% endif %}
            </span>
        </div>
    </form>
</div>
