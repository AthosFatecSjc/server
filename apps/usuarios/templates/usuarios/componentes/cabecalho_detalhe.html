<div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <div>
        <h1 class="text-3xl font-semibold text-gray-800">{{ titulo }}</h1>
        {% if descricao %}
            <p class="text-sm text-gray-500">{{ descricao }}</p>
        {% else %}
            <p class="text-sm text-gray-500">Detalhes completos do usuário e seu perfil de acesso.</p>
        {% endif %}
    </div>
    <div class="flex gap-2">
        <a href="{% url 'usuarios:editar' usuario.pk %}"
           class="inline-flex items-center gap-2 rounded-md border border-blue-500 px-4 py-2 text-sm font-medium text-blue-600 hover:bg-blue-50">
            <i class="fas fa-pen"></i>
            Editar
        </a>
        <a href="{% url 'usuarios:lista' %}"
           class="inline-flex items-center gap-2 rounded-md border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">
            <i class="fas fa-arrow-left"></i>
            Voltar
        </a>
    </div>
</div>
