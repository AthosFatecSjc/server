<form method="get" class="rounded-2xl border border-gray-200 bg-white p-4 shadow-sm">
    <div class="flex flex-col gap-4 lg:flex-row lg:items-center">
        <div class="relative flex-1">
            <span class="pointer-events-none absolute inset-y-0 left-4 flex items-center text-gray-400">
                <i class="fas fa-search"></i>
            </span>
            {{ filtro_form.busca }}
        </div>
        <div class="relative w-full lg:w-auto">
            <span class="pointer-events-none absolute inset-y-0 left-4 flex items-center text-gray-400">
                <i class="fas fa-layer-group"></i>
            </span>
            {{ filtro_form.perfil_acesso }}
        </div>
        <div class="relative w-full lg:w-auto">
            <span class="pointer-events-none absolute inset-y-0 left-4 flex items-center text-gray-400">
                <i class="fas fa-toggle-on"></i>
            </span>
            {{ filtro_form.status }}
        </div>
        <div class="flex items-center gap-2 lg:ml-auto">
            <a href="{% url 'usuarios:lista' %}"
               class="inline-flex items-center gap-2 rounded-full border border-gray-200 px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100">
                Limpar
            </a>
            <button type="submit"
                    class="inline-flex items-center gap-2 rounded-full bg-blue-600 px-5 py-2 text-sm font-semibold text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                <i class="fas fa-filter"></i>
                Aplicar
            </button>
        </div>
    </div>
</form>
